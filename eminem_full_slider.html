
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMINEM CLOTHES</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body 
{
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

/* ===== Neon Navbar ===== */
.neon-navbar 
{
  background: linear-gradient(45deg, #000000, #1a1a1a);
  box-shadow: 0 0 20px #ff0000;
}

.glow-text 
{
  font-size: 26px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 5px #ff0000,
               0 0 10px #ff0000,
               0 0 20px #ff0000;
}

/* ===== Fullscreen Slider ===== */
.carousel-item {
  height: 100vh;                        
  min-height: 100vh;
  background-size: cover;
  background-position: center;
  position: relative;
}

/* Floating Text */
.floating-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  animation: floatText 3s ease-in-out infinite alternate;
}

.floating-text h1 {
  font-size: 50px;                                    
  font-weight: bold;
  text-shadow: 0 0 15px #ff0000;
}

.floating-text p {
  font-size: 22px;
}

@keyframes floatText
{
  from { transform: translate(-50%, -55%); }
  to { transform: translate(-50%, -45%); }
}

@media (max-width: 768px)
{
  .floating-text h1
  {
    font-size: 28px;
  }
  .floating-text p {
    font-size: 16px;
  }
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg neon-navbar fixed-top">
  <div class="container">
    <a class="navbar-brand glow-text" href="#">EMINEM</a>
  </div>
</nav>

<!-- Fullscreen Image Slider -->
<div id="fashionSlider" class="carousel slide carousel-fade" data-bs-ride="carousel">

  <div class="carousel-inner">

    <div class="carousel-item active" style="background-image: url(./images/1448061.jpg);">
      <div class="floating-text">
        <h1>NEW COLLECTION 2026</h1>
        <p>Experience the Power of Street Fashion</p>
      </div>
    </div>

    <div class="carousel-item" style="background-image:url('./images/1438079.jpg');">
      <div class="floating-text">
        <h1>URBAN STYLE</h1>
        <p>Trendy. Bold. Fearless.</p>
      </div>
    </div>

    <div class="carousel-item" style="background-image: url('./images/OIP\ \(1\).jpeg');">
      <div class="floating-text">
        <h1>LIMITED EDITION</h1>
        <p>Exclusive Fashion Drops</p>
      </div>
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#fashionSlider" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#fashionSlider" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
